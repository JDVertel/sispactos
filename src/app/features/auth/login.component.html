<!-- Pantalla de ingreso al sistema -->
<section class="login-shell" [class.login-shell-compact]="compactMode">
  <div class="login-card login-layout">
    <!-- Lado visual con imagen institucional -->
    <div class="login-media login-media-panel" *ngIf="!compactMode">
      <img src="/dnp.jpg" alt="Departamento Nacional de Planeacion" class="login-media-image" />
      <div class="login-media-overlay">
        <h1 class="login-media-title mb-1">SISPACTOS</h1>
        <p class="mb-0 login-media-description">Seguimiento y monitoreo de Pactos Territoriales</p>
      </div>
    </div>

    <!-- Lado del formulario de acceso -->
    <div class="login-form-panel">
      <div class="login-form-content">
      <h2 class="login-form-title">Inicia sesion</h2>
      <p class="login-form-subtitle">Accede para consultar el avance de proyectos, contratos y pactos.</p>

      <!-- Formulario principal -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form-stack">
        <p class="small text-secondary mb-0">Diligencia los siguientes datos</p>

        <div class="login-fieldset">
          <label for="username" class="form-label">Usuario</label>
          <input id="username" name="username" type="text" class="form-control" [(ngModel)]="username" required placeholder="Ingresa tu Email" />
        </div>

        <div class="login-fieldset">
          <label for="password" class="form-label">Contrasena</label>
          <input id="password" name="password" type="password" class="form-control" [(ngModel)]="password" required placeholder="Ingresa tu Contrasena" />
        </div>

        <div *ngIf="loginError" class="alert alert-danger py-2 px-3 mb-0" role="alert">
          {{ loginError }}
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="!loginForm.form.valid || isSubmitting">
          {{ isSubmitting ? 'Validando...' : 'Ingresar' }}
        </button>
      </form>
      </div>
    </div>
  </div>
</section>
