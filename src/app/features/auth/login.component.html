<!-- Pantalla de ingreso al sistema -->
<section class="login-shell min-vh-100 d-flex align-items-center justify-content-center py-4 px-3">
  <div class="row g-0 w-100 border bg-white rounded-3 overflow-hidden login-card">
    <!-- Lado visual con imagen institucional -->
    <div class="col-12 col-lg-6 login-media">
      <img src="/dnp.jpg" alt="Departamento Nacional de Planeacion" class="login-media-image" />
      <div class="login-media-overlay">
       
        <p class="mb-0 text-white small">Seguimiento y monitoreo de Pactos Territoriales</p>
      </div>
    </div>

    <!-- Lado del formulario de acceso -->
    <div class="col-12 col-lg-6 p-4 p-lg-5 d-flex align-items-center">
      <div class="w-100">
      <h2 class="h4 mb-3">Inicia sesion</h2>

      <!-- Formulario principal -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="vstack gap-3">
        <div>
          <label class="form-label d-block">Tipo de acceso</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="mode" id="modeGuest" value="guest" [(ngModel)]="loginMode" />
              <label class="form-check-label" for="modeGuest">Invitado</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="mode" id="modeLocal" value="local" [(ngModel)]="loginMode" />
              <label class="form-check-label" for="modeLocal">Usuario Registrado</label>
            </div>
          </div>
        </div>

        <p class="small text-secondary mb-0" *ngIf="loginMode === 'local'">Diligencia los siguientes datos</p>

        <div *ngIf="loginMode === 'local'">
          <label for="username" class="form-label">Usuario</label>
          <input id="username" name="username" type="text" class="form-control" [(ngModel)]="username" required placeholder="Ingresa tu Email" />
        </div>

        <div *ngIf="loginMode === 'local'">
          <label for="password" class="form-label">Contrasena</label>
          <input id="password" name="password" type="password" class="form-control" [(ngModel)]="password" required placeholder="Ingresa tu Contrasena" />
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loginMode === 'local' && !loginForm.form.valid">Ingresar</button>
      </form>
      </div>
    </div>
  </div>
</section>
