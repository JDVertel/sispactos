<section class="page">
  <header class="page-header">
    <h4 class="subtitle">{{ pageDescription }}</h4>
  </header>

  <div *ngIf="currentPage === 'home'" class="dashboard-grid">
    <div *ngFor="let card of dashboardCards" 
         class="dashboard-card" 
         [class.dashboard-card--expanded]="card.isWide"
         [class]="'dashboard-card--' + card.size" 
         [style.--card-color]="card.color">
      <div class="card-icon" [ngSwitch]="card.icon">
        <svg *ngSwitchCase="'handshake'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 12H3M16 6H19C20.1 6 21 6.9 21 8V10M16 6L13.0815 8.91846C12.4205 9.57943 11.5795 9.57943 10.9185 8.91846L8 6M16 6V3M8 6H5C3.9 6 3 6.9 3 8V10M8 6V3M21 14L17.25 17.75C16.5 18.5 15.5 18.5 14.75 17.75L12.5 15.5M3 14L6.75 17.75C7.5 18.5 8.5 18.5 9.25 17.75L12.5 14.5V14.5C13.25 13.75 14.25 13.75 15 14.5L15.5 15"/>
        </svg>
        <svg *ngSwitchCase="'currency'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <path d="M14.5 9.5C14.5 8.11929 13.3807 7 12 7C10.6193 7 9.5 8.11929 9.5 9.5C9.5 10.8807 10.6193 12 12 12C13.3807 12 14.5 13.1193 14.5 14.5C14.5 15.8807 13.3807 17 12 17C10.6193 17 9.5 15.8807 9.5 14.5M12 5V7M12 17V19"/>
        </svg>
        <svg *ngSwitchCase="'building'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21H21M4 18V7C4 6.44772 4.44772 6 5 6H12C12.5523 6 13 6.44772 13 7V18M13 10H19C19.5523 10 20 10.4477 20 11V18M7 9H10M7 12H10M7 15H10M14 15H17"/>
        </svg>
        <svg *ngSwitchCase="'map-marker'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3C8.68629 3 6 5.68629 6 9C6 13.5 12 21 12 21C12 21 18 13.5 18 9C18 5.68629 15.3137 3 12 3Z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <svg *ngSwitchCase="'city'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21H21M5 21V9L12 3L19 9V21M9 12H10M9 15H10M14 12H15M14 15H15"/>
        </svg>
        <svg *ngSwitchCase="'folder-open'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7C3 5.89543 3.89543 5 5 5H9L11 7H19C20.1046 7 21 7.89543 21 9V10M3 10L4.5 17.5C4.77614 18.8807 5.93449 19.9 7.34171 19.9H16.6583C18.0655 19.9 19.2239 18.8807 19.5 17.5L21 10H3Z"/>
        </svg>
        <svg *ngSwitchCase="'check-circle'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <path d="M8 12L11 15L16 9"/>
        </svg>
        <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21V19C17 17.3431 15.6569 16 14 16H10C8.34315 16 7 17.3431 7 19V21M21 21V19C21 17.3431 19.6569 16 18 16H17.5M15 7C15 8.65685 13.6569 10 12 10C10.3431 10 9 8.65685 9 7C9 5.34315 10.3431 4 12 4C13.6569 4 15 5.34315 15 7ZM21 8C21 9.10457 20.1046 10 19 10C17.8954 10 17 9.10457 17 8C17 6.89543 17.8954 6 19 6C20.1046 6 21 6.89543 21 8Z"/>
        </svg>
        <svg *ngSwitchCase="'progress'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 7H21M13 12H21M13 17H21M6 20L3 17L6 14M6 4L3 7L6 10"/>
        </svg>
        <svg *ngSwitchCase="'wallet-check'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V17C3 18.1046 3.89543 19 5 19H19C20.1046 19 21 18.1046 21 17V9C21 7.89543 20.1046 7 19 7H5C3.89543 7 3 6.10457 3 5V5C3 3.89543 3.89543 3 5 3H18M17 12H17.01M14 12L15.5 13.5L18 11"/>
        </svg>
      </div>
      <div class="card-content">
        <p class="card-value">{{ card.value }}</p>
        <h3 class="card-label">{{ card.label }}</h3>
      </div>
    </div>

  </div>
  
  <div *ngIf="currentPage !== 'home'" class="page-card">
    <p>Contenido en construccion.</p>
  </div>

</section>
