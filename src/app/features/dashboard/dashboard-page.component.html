<section class="container-fluid px-0">
  <header class="mb-4">
    <h4 class="text-secondary mb-0">{{ pageDescription }}</h4>
  </header>

  <div class="row g-3" *ngIf="currentPage === 'home'">
    <div
      *ngFor="let card of dashboardCards"
      class="col-12 col-sm-6 col-lg-3"
    >
      <div
        class="card summary-card h-100"
        [class.summary-card-selected]="selectedCardLabel === card.label"
        (click)="selectCard(card.label)"
      >
        <div class="card-body">
          <div class="summary-card-header mb-1">
            <i
              class="bi summary-card-icon"
              [ngClass]="getIconClass(card.icon)"
              [class.summary-card-icon-selected]="selectedCardLabel === card.label"
              aria-hidden="true"
            ></i>
          </div>
          <p class="mb-1 summary-card-value">{{ card.value }}</p>
          <h3 class="h6 mb-0 summary-card-label">{{ card.label }}</h3>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="currentPage !== 'home'" class="alert alert-light border">
    Contenido en construccion.
  </div>
</section>
