<header class="topbar">
  <div class="topbar-brand">
    <img src="/pactos-territoriales-logo.png" alt="SISPACTOS" class="topbar-logo" />
    <p class="topbar-subtitle mb-0">Sistema de Informacion para el seguimiento de Pactos Territoriales</p>
  </div>
</header>

<div class="dashboard-shell">
  <app-sidebar
    [menuItems]="menuItems"
    [isSidebarOpen]="isSidebarOpen"
    [activeSubmenu]="activeSubmenu"
    [sessionUserName]="sessionUserName"
    [sessionUserRole]="sessionUserRole"
    (toggleSidebarEvent)="toggleSidebar()"
    (toggleSubmenuEvent)="toggleSubmenu($event)"
    (closeAllMenusEvent)="closeAllMenus()"
    (closeSidebarEvent)="closeSidebar()"
  ></app-sidebar>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
<app-footer></app-footer>
