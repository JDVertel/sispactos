<!-- Fondo oscuro para cerrar el menú tocando fuera -->
<button
  class="menu-overlay"
  type="button"
  [class.is-visible]="isSidebarOpen"
  aria-label="Cerrar menu"
  (click)="closeAllMenus()"
></button>

<!-- Botón flotante para abrir menú en pantallas pequeñas -->
<button
  class="sidebar-fab btn btn-primary d-lg-none"
  type="button"
  (click)="toggleSidebar()"
  aria-label="Abrir menu"
  [class.is-hidden]="isSidebarOpen"
>
  Menu
</button>

<!-- Menú lateral principal -->
<aside class="sidebar card border-0 rounded-0" [class.is-open]="isSidebarOpen">
  <!-- Encabezado del menú con logo -->
  <div class="d-flex align-items-center justify-content-between mb-3 sidebar-head">
    <div class="sidebar-logo-block">
      <img src="/logodnp.png" alt="DNP" class="sidebar-logo" />
    </div>
    <button class="btn btn-outline-secondary btn-sm d-lg-none" type="button" (click)="closeAllMenus()" aria-label="Cerrar menu">
      X
    </button>
  </div>

  <!-- Opciones de navegación -->
  <nav class="nav flex-column gap-1 sidebar-nav">
    <ng-container *ngFor="let item of menuItems">
      <!-- Opción simple -->
      <button
        *ngIf="item.type === 'item' && item.action"
        type="button"
        class="nav-link rounded px-3 py-2 d-flex align-items-center gap-2 menu-link w-100 text-start"
        (click)="runMenuAction(item.action)"
      >
        <i class="menu-icon bi" [class]="'menu-icon bi ' + getBootstrapIconClass(item.icon)" aria-hidden="true"></i>
        {{ formatLabel(item.label) }}
      </button>

      <a
        *ngIf="item.type === 'item' && !item.action"
        class="nav-link rounded px-3 py-2 d-flex align-items-center gap-2 menu-link"
        [routerLink]="item.absolute ? item.route : ['/dashboard', item.route]"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidebar()"
      >
        <i class="menu-icon bi" [class]="'menu-icon bi ' + getBootstrapIconClass(item.icon)" aria-hidden="true"></i>
        {{ formatLabel(item.label) }}
      </a>

      <!-- Opción con submenú -->
      <div *ngIf="item.type === 'submenu'" class="vstack gap-1">
        <button
          type="button"
          class="btn text-start d-flex justify-content-between align-items-center menu-link menu-button"
          (click)="toggleSubmenu(item.label)"
        >
          <span class="d-flex align-items-center gap-2">
            <i class="menu-icon bi" [class]="'menu-icon bi ' + getBootstrapIconClass(item.icon)" aria-hidden="true"></i>
            <span>{{ formatLabel(item.label) }}</span>
          </span>
          <span class="submenu-indicator" aria-hidden="true">+</span>
        </button>

        <!-- Hijos del submenú -->
        <div class="vstack gap-1 ms-3" *ngIf="activeSubmenu === item.label">
          <a
            *ngFor="let child of item.children"
            class="nav-link rounded px-3 py-1 menu-link"
            [routerLink]="['/dashboard', child.route]"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeAllMenus()"
          >
            {{ formatLabel(child.label) }}
          </a>
        </div>
      </div>

      <!-- Título separador entre grupos -->
      <p *ngIf="item.type === 'separator'" class="small text-uppercase text-secondary fw-semibold mt-2 mb-1 px-2">{{ formatLabel(item.label) }}</p>
    </ng-container>
  </nav>
</aside>
